  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <rect x="5.5" y="5.5" width="89" height="89" rx="18.5" fill="none" stroke="#4a4133" stroke-width="1"/>

  <g fill="none" stroke="url(#gold)" stroke-width="6.5" stroke-linejoin="round">
    <g mask="url(#m1)">
      <ellipse cx="34" cy="66" rx="10.5" ry="16" transform="rotate(-40 34 66)"/>
    </g>
    <g mask="url(#m2)">
