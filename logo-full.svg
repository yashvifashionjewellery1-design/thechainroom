<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2d079"/>
      <stop offset="0.5" stop-color="#d4a843"/>
      <stop offset="1" stop-color="#a9801f"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#262119"/>
      <stop offset="1" stop-color="#15120d"/>
    </linearGradient>
    <mask id="lm1">
      <rect width="360" height="100" fill="white"/>
      <ellipse cx="50" cy="50" rx="10.5" ry="16" transform="rotate(-40 50 50)" fill="black" stroke="black" stroke-width="11"/>
    </mask>
    <mask id="lm2">
      <rect width="360" height="100" fill="white"/>
      <ellipse cx="66" cy="34" rx="10.5" ry="16" transform="rotate(-40 66 34)" fill="black" stroke="black" stroke-width="11"/>
    </mask>
  </defs>

  <rect width="360" height="100" rx="18" fill="url(#bg)"/>

  <!-- Emblem -->
  <g fill="none" stroke="url(#gold)" stroke-width="6.5" stroke-linejoin="round">
    <g mask="url(#lm1)">
      <ellipse cx="34" cy="66" rx="10.5" ry="16" transform="rotate(-40 34 66)"/>
    </g>
    <g mask="url(#lm2)">
      <ellipse cx="50" cy="50" rx="10.5" ry="16" transform="rotate(-40 50 50)"/>
    </g>
    <ellipse cx="66" cy="34" rx="10.5" ry="16" transform="rotate(-40 66 34)"/>
  </g>

  <!-- Divider -->
  <line x1="104" y1="26" x2="104" y2="74" stroke="#4a4133" stroke-width="1.5"/>

  <!-- Wordmark -->
  <text x="124" y="46" font-family="'Space Grotesk', Arial, Helvetica, sans-serif" font-weight="700" font-size="22" letter-spacing="1.5" fill="#ece4d6">THE CHAIN</text>
  <text x="124" y="74" font-family="'Space Grotesk', Arial, Helvetica, sans-serif" font-weight="700" font-size="22" letter-spacing="6.5" fill="url(#gold)">ROOM</text>
</svg>
